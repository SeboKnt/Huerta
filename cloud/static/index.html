<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Huerta Function Check</title>
  <style>
    :root {
      --bg: #f3f7ef;
      --card: #ffffff;
      --text: #1c2a1f;
      --accent: #2f9e44;
      --muted: #5f6f62;
      --danger: #c92a2a;
      --ok: #2b8a3e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, #d8f3dc 0%, transparent 30%),
        radial-gradient(circle at 85% 80%, #cdeac0 0%, transparent 35%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 14px 50px rgba(20, 45, 23, 0.14);
      padding: 28px;
      border: 1px solid #e2ebde;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 2.8vw, 2.2rem);
      letter-spacing: 0.02em;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.45;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      font-weight: 700;
      padding: 14px 16px;
      border-radius: 12px;
      background: #eef8ef;
      border: 1px solid #dbefdd;
      margin-bottom: 16px;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(47, 158, 68, 0.55);
      animation: pulse 1.8s infinite;
    }

    .meta {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.92rem;
      background: #f7faf5;
      border: 1px solid #e4ecdf;
      border-radius: 10px;
      padding: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
      line-height: 1.35;
    }

    .fail {
      color: var(--danger);
      background: #fff5f5;
      border-color: #ffd8d8;
    }

    .ok {
      color: var(--ok);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(47, 158, 68, 0.6); }
      70% { box-shadow: 0 0 0 12px rgba(47, 158, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(47, 158, 68, 0); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Huerta Azure Function</h1>
    <p>Diese Seite ruft den Health-Endpunkt der Function auf. Wenn unten ok erscheint, ist die Function live erreichbar.</p>
    <section id="statusBox" class="status">
      <span class="dot" aria-hidden="true"></span>
      <span id="statusText">Pruefe Verbindung...</span>
    </section>
    <pre id="details" class="meta">warte auf Antwort...</pre>
  </main>

  <script>
    async function checkHealth() {
      const statusBox = document.getElementById("statusBox");
      const statusText = document.getElementById("statusText");
      const details = document.getElementById("details");

      try {
        const response = await fetch("/health", { method: "GET" });
        const data = await response.json();

        if (!response.ok || data.status !== "ok") {
          throw new Error("Ungueltige Antwort");
        }

        statusText.textContent = "ok - Function erreichbar";
        statusText.classList.add("ok");
        details.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        statusBox.classList.add("fail");
        statusText.textContent = "Fehler - Function nicht erreichbar";
        details.textContent = String(error);
      }
    }

    checkHealth();
  </script>
</body>
</html>
