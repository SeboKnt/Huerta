<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Huerta ESP32 Dashboard</title>
  <style>
    :root {
      --bg: #f1efe8;
      --panel: #fffdf8;
      --ink: #25231d;
      --muted: #6a6659;
      --line: #ded8c9;
      --accent: #0d9488;
      --danger: #b42318;
      --ok: #1f7a3d;
      --chip: #ece8db;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 80% 0%, #d8efe6 0%, transparent 35%),
        radial-gradient(circle at 10% 100%, #f4e3cc 0%, transparent 35%),
        var(--bg);
      padding: 28px;
    }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 18px;
      animation: rise 0.45s ease-out;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3.4vw, 2.6rem);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .badge {
      background: var(--chip);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.85rem;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(36, 34, 29, 0.08);
      overflow: hidden;
      animation: rise 0.55s ease-out;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid #ece7db;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #f7f3e8;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #656050;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.85rem;
      border: 1px solid transparent;
      background: #f5f5f3;
    }

    .chip.online {
      color: var(--ok);
      background: #ebf8ef;
      border-color: #ccebd5;
    }

    .chip.offline {
      color: var(--danger);
      background: #fff3f2;
      border-color: #ffd9d6;
    }

    .chip.restarting {
      color: #855b00;
      background: #fff7e8;
      border-color: #ffe3b3;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: 9px;
      padding: 7px 11px;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: #b6b09d;
    }

    .log {
      margin-top: 14px;
      padding: 12px;
      background: #1d1f21;
      color: #f6f8fa;
      border-radius: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85rem;
      min-height: 56px;
      white-space: pre-wrap;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 850px) {
      body {
        padding: 14px;
      }

      table,
      thead,
      tbody,
      tr,
      th,
      td {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        border-bottom: 1px solid #ece7db;
        padding: 8px 0;
      }

      td {
        border-bottom: none;
        padding: 6px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Huerta ESP32 Dashboard</h1>
      <p class="subtitle">Lokale Verwaltung ohne Datenbank. Cosmos kann spaeter darunter gehangen werden.</p>
    </section>

    <section class="topbar">
      <span id="deviceCount" class="badge">Lade Geraete...</span>
      <button id="reloadBtn" type="button">Neu laden</button>
    </section>

    <section class="panel">
      <table>
        <thead>
          <tr>
            <th>Geraet</th>
            <th>Status</th>
            <th>Firmware</th>
            <th>IP</th>
            <th>Letztes Signal</th>
            <th>Bewaesserung</th>
            <th>Aktionen</th>
          </tr>
        </thead>
        <tbody id="deviceTable">
          <tr><td colspan="7">Lade Daten...</td></tr>
        </tbody>
      </table>
    </section>

    <pre id="log" class="log">Bereit.</pre>
  </main>

  <script>
    const tableBody = document.getElementById("deviceTable");
    const countBadge = document.getElementById("deviceCount");
    const reloadBtn = document.getElementById("reloadBtn");
    const logBox = document.getElementById("log");

    function log(message) {
      const ts = new Date().toLocaleTimeString("de-DE");
      logBox.textContent = `[${ts}] ${message}`;
    }

    function statusChip(status) {
      const safe = String(status || "unknown");
      return `<span class="chip ${safe}">${safe}</span>`;
    }

    async function loadDevices() {
      tableBody.innerHTML = `<tr><td colspan="7">Lade Daten...</td></tr>`;

      try {
        const response = await fetch("/devices", { method: "GET" });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || "API Fehler");
        }

        const devices = Array.isArray(data.devices) ? data.devices : [];
        countBadge.textContent = `${devices.length} Geraete verbunden`;

        if (devices.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="7">Keine Geraete vorhanden.</td></tr>`;
          return;
        }

        tableBody.innerHTML = devices.map((d) => `
          <tr>
            <td><strong>${d.name || d.id}</strong><br><small>${d.id}</small></td>
            <td>${statusChip(d.status)}</td>
            <td>${d.firmware || "-"}</td>
            <td>${d.ip || "-"}</td>
            <td>${d.last_seen_utc || "-"}</td>
            <td>${d.watering_enabled ? "aktiv" : "aus"}</td>
            <td>
              <div class="actions">
                <button type="button" data-action="restart" data-device="${d.id}">Restart</button>
                <button type="button" data-action="set_watering_on" data-device="${d.id}">Water ON</button>
                <button type="button" data-action="set_watering_off" data-device="${d.id}">Water OFF</button>
              </div>
            </td>
          </tr>
        `).join("");

        log("Geraeteliste erfolgreich geladen.");
      } catch (error) {
        tableBody.innerHTML = `<tr><td colspan="7">Fehler beim Laden: ${String(error)}</td></tr>`;
        countBadge.textContent = "Fehler";
        log(`Fehler: ${String(error)}`);
      }
    }

    async function sendAction(deviceId, action) {
      let body;
      if (action === "restart") {
        body = { action: "restart" };
      } else if (action === "set_watering_on") {
        body = { action: "set_watering", enabled: true };
      } else if (action === "set_watering_off") {
        body = { action: "set_watering", enabled: false };
      } else {
        return;
      }

      try {
        const response = await fetch(`/devices/${deviceId}/action`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || "Aktion fehlgeschlagen");
        }
        log(`Aktion '${body.action}' fuer ${deviceId} erfolgreich.`);
        await loadDevices();
      } catch (error) {
        log(`Aktion fehlgeschlagen: ${String(error)}`);
      }
    }

    tableBody.addEventListener("click", async (event) => {
      const btn = event.target.closest("button[data-action]");
      if (!btn) {
        return;
      }

      const deviceId = btn.getAttribute("data-device");
      const action = btn.getAttribute("data-action");
      if (!deviceId || !action) {
        return;
      }
      await sendAction(deviceId, action);
    });

    reloadBtn.addEventListener("click", loadDevices);

    loadDevices();
  </script>
</body>
</html>
